spring:
  application:
    name: xxe-upload-service
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: always  # Helps leak XXE data in errors

logging:
  level:
    root: INFO
    com.apex.xxe: DEBUG
