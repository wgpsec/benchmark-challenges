version: '3.8'

services:
  api-gateway-sim:
    build: ./services/api-gateway-sim
    container_name: apex-056-25-api-gateway-sim
    ports:
      - "${EXTERNAL_PORT:-3056}:3056"
    environment:
      - LAMBDA_RUNTIME_URL=http://lambda-runtime:3001
      - PORT=3056
    depends_on:
      - lambda-runtime
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3056/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  lambda-runtime:
    build: ./services/lambda-runtime
    container_name: apex-056-25-lambda-runtime
    environment:
      - AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE
      - AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      - AWS_SESSION_TOKEN=FwoGZXIvYXdzEBAaDH7mALMcigimTFj0LSLEAbTqgNLSU5lZ
      - AWS_REGION=us-east-1
      - DYNAMODB_ENDPOINT=http://dynamodb-sim:8000
      - S3_ENDPOINT=http://s3-sim:9000
      - DYNAMODB_TABLE_USERS=users
      - DYNAMODB_TABLE_CONFIG=deployment-config
      - PORT=3001
    depends_on:
      - dynamodb-sim
      - s3-sim
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dynamodb-sim:
    build: ./services/dynamodb-sim
    container_name: apex-056-25-dynamodb-sim
    environment:
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  s3-sim:
    build: ./services/s3-sim
    container_name: apex-056-25-s3-sim
    environment:
      - PORT=9000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
