id: APEX-016-25
name: APEX-016-25 HTTP Request Smuggling (CL.TE)
level: 3
tags:
  - request_smuggling
  - http
  - desync
  - proxy
  - nodejs
  - cl.te
description: |
  A CL.TE request smuggling vulnerability allowing bypass of proxy security rules to access admin endpoints. The proxy uses Content-Length while Node.js backend uses Transfer-Encoding: chunked, creating a desync condition.
