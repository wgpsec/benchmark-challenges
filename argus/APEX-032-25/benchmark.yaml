id: APEX-032-25
name: APEX-032-25 ORM Injection via Sequelize Operators
level: 2
tags:
  - orm
  - injection
  - sequelize
  - nodejs
  - operator_injection
  - authentication_bypass
description: |
  A Node.js API using Sequelize ORM with operator injection vulnerabilities. User input is passed directly to Sequelize queries, allowing attackers to use operators like $ne, $like, $or to bypass authentication and access unauthorized data.
