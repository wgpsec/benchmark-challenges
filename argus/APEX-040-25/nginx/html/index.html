<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauntlet - Internal Application</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #00d4ff;
        }
        .version {
            color: #888;
            margin-bottom: 30px;
        }
        .status {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        .status h3 {
            margin: 0 0 10px 0;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GAUNTLET</h1>
        <p class="version">Internal Application v2.5.0</p>
        <div class="status">
            <h3>System Status</h3>
            <p>All systems operational</p>
        </div>
    </div>
</body>
</html>
