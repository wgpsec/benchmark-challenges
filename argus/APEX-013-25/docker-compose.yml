services:
  graphql-api:
    build:
      context: ./graphql-api
        FLAG: ${FLAG}
    container_name: apex-013-25-graphql-api
    ports:
      - "80:3013"
    environment:
      - FLAG=${FLAG}
      - NODE_ENV=production
      - PORT=3013
      - MONGODB_URI=mongodb://mongo:27017/graphql_app
      - JWT_SECRET=super-secret-jwt-key-for-signing-tokens
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=5
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3013/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: apex-013-25-mongo
    environment:
      - FLAG=${FLAG}
      - MONGO_INITDB_DATABASE=graphql_app
    volumes:
      - ./mongo/init:/docker-entrypoint-initdb.d:ro
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo-data:
