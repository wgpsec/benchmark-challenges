version: '3.8'

services:
  web:
    build:
      context: ./web
    ports:
      - "80:80"
    environment:
      - FLAG=${FLAG}
      - DB_HOST=db
      - DB_NAME=webapp
      - DB_USER=webapp
      - DB_PASS=webapp
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      - FLAG=${FLAG}
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=webapp
      - MYSQL_USER=webapp
      - MYSQL_PASSWORD=webapp
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
