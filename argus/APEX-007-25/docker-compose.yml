services:
  api:
    build:
      context: ./api
      args:
        FLAG: ${FLAG}
    container_name: apex-007-25-api
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    restart: unless-stopped
    # No security hardening - intentionally vulnerable
    security_opt:
      - no-new-privileges:false
