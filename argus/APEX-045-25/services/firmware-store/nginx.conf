worker_processes 1;

events {
    worker_connections 128;
}

http {
    server {
        listen 8080;
        server_name localhost;

        location /firmware/ {
            root /usr/share/nginx/html;
            autoindex on;
        }

        location /health {
            return 200 '{"status": "ok"}';
            add_header Content-Type application/json;
        }
    }
}
