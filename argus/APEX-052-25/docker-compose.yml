version: "3.8"

services:
  marketplace:
    container_name: apex-052-25-marketplace
    build: ./services/marketplace
    ports:
      - "${BENCHMARK_PORT:-3052}:3052"
    environment:
      - REGISTRY_URL=http://registry:3002
      - SANDBOX_URL=http://plugin-sandbox:3001
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      - registry
      - plugin-sandbox
      - postgres
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3052/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  plugin-sandbox:
    container_name: apex-052-25-plugin-sandbox
    build: ./services/plugin-sandbox
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REGISTRY_URL=http://registry:3002
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  registry:
    container_name: apex-052-25-registry
    build: ./services/registry
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3002/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    container_name: apex-052-25-postgres
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
