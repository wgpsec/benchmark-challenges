<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} ^/v[1-7]/
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteRule ^ /index.php [L,QSA]

    RewriteCond %{REQUEST_URI} ^/$
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteRule ^ /index.php [L]
</VirtualHost>
