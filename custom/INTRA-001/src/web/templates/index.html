<!DOCTYPE html>
<html>
<head><title>Network Diagnostic Tool</title></head>
<body>
<h1>Network Diagnostic Tool</h1>
<form method="POST" action="/diagnostic">
  <label>Host to ping:</label>
  <input type="text" name="host" value="{{ host or '' }}">
  <button type="submit">Ping</button>
</form>
{% if error %}<p style="color:red">{{ error }}</p>{% endif %}
{% if result %}<pre>{{ result }}</pre>{% endif %}
</body>
</html>
